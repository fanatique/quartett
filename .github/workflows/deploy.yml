name: Deploy to FTP

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      full_deploy:
        description: Full deploy with remote cleanup
        required: false
        default: false
        type: boolean

jobs:
  deploy:
    name: Deploy to Quartett subfolder
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate deploy secrets
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME_PRODUCTION: ${{ secrets.FTP_USERNAME_PRODUCTION }}
          FTP_PASSWORD_PRODUCTION: ${{ secrets.FTP_PASSWORD_PRODUCTION }}
        run: |
          test -n "$FTP_SERVER" || { echo "::error::Missing GitHub secret FTP_SERVER"; exit 1; }
          test -n "$FTP_USERNAME_PRODUCTION" || { echo "::error::Missing GitHub secret FTP_USERNAME_PRODUCTION"; exit 1; }
          test -n "$FTP_PASSWORD_PRODUCTION" || { echo "::error::Missing GitHub secret FTP_PASSWORD_PRODUCTION"; exit 1; }

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@4.3.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME_PRODUCTION }}
          password: ${{ secrets.FTP_PASSWORD_PRODUCTION }}
          protocol: ftps
          port: 21
          local-dir: ./
          server-dir: ./quartett/
          dangerous-clean-slate: ${{ github.event_name == 'workflow_dispatch' && inputs.full_deploy || false }}
          exclude: |
            **/.DS_Store
            .gitignore
            api/sessions/.gitkeep
            .git
            .github
